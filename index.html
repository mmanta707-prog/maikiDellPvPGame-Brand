<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>maikiDellPvP V1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-glow"></div>

    <header>
        <div class="logo">💎 M</div>
        <nav>
            <a href="#specs">Specs</a>
            <a href="#about">About</a>
            <a href="#coming">Coming Soon</a>
        </nav>
    </header>

    <section class="hero">
        <h1>maikiDellPvP V1</h1>
        <p class="tagline">クリックの差が、勝敗の差になる。</p>

        <div class="buttons">
            <button id="notifyBtn">COMING SOON</button>
        </div>
    </section>

    <section id="specs" class="card">
        <h2>Specifications</h2>
        <div class="spec-grid">
            <div>PAW3395</div>
            <div>1000Hz - 8000Hz</div>
            <div>70g</div>
            <div>左右対称</div>
            <div>パラコードケーブル</div>
            <div>ドラッグクリック対応</div>
        </div>
    </section>

    <section id="about" class="card">
        <h2>About</h2>
        <p>
            Minecraft PvPプレイヤー向けに設計された
            ゲーミングデバイスブランド。
        </p>
    </section>

    <section id="coming" class="card">
        <h2>Launch Colors</h2>

        <div class="colors">
            <div class="color diamond">Diamond Clear</div>
            <div class="color emerald">Emerald Clear</div>
            <div class="color black">Matte Black</div>
            <div class="color white">Pure White</div>
        </div>
    </section>

    <footer>
        © 2026 maikiDellPvP
    </footer>

    <script src="script.js"></script>
</body>
</html>
