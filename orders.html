<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Orders</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🧾 注文履歴</h1>

<div id="orders"></div>

<script>
const orders = JSON.parse(localStorage.getItem("orders")) || [];
document.getElementById("orders").innerHTML =
orders.map(o => `<p>💰 ¥${o.total}</p>`).join("");
</script>

</body>
</html>
